<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ты,я и кронштадские булочки</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="invite-card">
      <h1 class="title">ты,я и кронштадские булочки</h1>
      <p class="event">поездка в Кронштадт в эти выходные</p>
      <p class="note">Принимается ответ только <strong>ДА</strong></p>
      <div class="controls">
        <button id="yes" class="btn yes">ДА</button>
      </div>

      <div id="gif-block" class="gif-block" style="display:none;">
        <div class="overlay"></div>
        <div class="gif-wrap">
          <img src="https://i.pinimg.com/originals/66/d8/a6/66d8a67d1a0fbf58e67c41ef10f505df.gif" alt="Счастливая гифка" id="gif-img" />
          <div class="gif-text">ты жопа 💖</div>
          <button id="closeGif" class="btn close-btn">тыкнуть в попу</button>
        </div>
      </div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
