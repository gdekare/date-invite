<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Свидание</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="invite-card">
      <h1 class="title">СВИДАНИЕ</h1>
      <p class="event">поездка в Кронштадт в эти выходные</p>
      <p class="note">Принимается ответ только <strong>ДА</strong></p>
      <div class="controls">
        <button id="yes" class="btn yes">ДА</button>
      </div>

      <div id="gif-block" class="gif-block" style="display:none;">
        <div class="overlay"></div>
        <div class="gif-wrap">
          <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3R6eW55bW8yc3Z3M3Z3M3Z3M3Z3M3Z3M3Z3M3Z3M3Z3M3Z3M3Z3/l0HlHFRbmaZtBRhXG/giphy.gif" alt="Счастливая гифка" id="gif-img" />
          <div class="gif-text">Спасибо! Я очень рада! 💖</div>
          <button id="closeGif" class="btn close-btn">Закрыть</button>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
